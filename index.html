<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicidades Jessy! - Primavera Events Group</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- Meta tags for SEO and sharing -->
    <meta name="description" content="El presidente de El Salvador envía mensaje a México a una mexicana muy destacada">
    
    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Un mensaje especial para Jessy">
    <meta property="og:description" content="El presidente de El Salvador envía mensaje a México a una mexicana muy destacada">
    <meta property="og:image" content="https://5410m0n0c001.github.io/Feliz-cumplea-os-jessy/destacada.webp">
    <meta property="og:url" content="https://5410m0n0c001.github.io/Feliz-cumplea-os-jessy/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Un mensaje especial para Jessy">
    <meta name="twitter:description" content="El presidente de El Salvador envía mensaje a México a una mexicana muy destacada">
    <meta name="twitter:image" content="https://5410m0n0c001.github.io/Feliz-cumplea-os-jessy/destacada.webp">
</head>
<body>

    <div id="app">
        <!-- Cover Section -->
        <div id="cover-container">
            <img src="sobrec.png" alt="Sobre de Invitación" id="envelope">
            <p class="instruction">Toca para abrir</p>
        </div>

        <!-- Video Section -->
        <div id="video-wrapper">
            <div id="greeting-card" style="opacity: 0;">
                <h2>¡Felicidades Jessy!</h2>
                <p>De parte de Alex Salomón,</p>
                <p>te mando un fuerte abrazo.</p>
            </div>
            <video id="intro-video" playsinline preload="auto">
                <source id="intro-video-source" src="sobrev.mp4" type="video/mp4">
            </video>
            <video id="main-video" playsinline preload="none" style="display: none;">
                <source id="main-video-source" src="video.mp4" type="video/mp4">
            </video>
        </div>
        <!-- Music Section -->
        <audio id="bg-music" loop>
            <source id="bg-music-source" src="mañanitas.mp3" type="audio/mpeg">
        </audio>
        
        <div class="floating-controls">
            <button id="music-toggle" class="control-btn" aria-label="Controlar música">
                <svg id="play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <svg id="pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>

            <button id="video-toggle" class="control-btn" aria-label="Controlar video" style="display: none;">
                <svg id="v-play-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 7l-7 5 7 5V7z"></path>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                </svg>
                <svg id="v-pause-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                    <rect x="6" y="4" width="4" height="16"></rect>
                    <rect x="14" y="4" width="4" height="16"></rect>
                </svg>
            </button>

            <button id="share-btn" class="control-btn" aria-label="Compartir invitación">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                    <polyline points="16 6 12 2 8 6"></polyline>
                    <line x1="12" y1="2" x2="12" y2="15"></line>
                </svg>
            </button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
